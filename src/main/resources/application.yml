spring:
  datasource:
    url: jdbc:h2:mem:jobqueue;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

queue:
  default-visibility-timeout-seconds: 30
  max-attempts: 5

server:
  error:
    include-message: always
